name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Type check
        run: npm run type-check
      - name: Validate data and demo sync
        run: npm run validate:full
      - name: Generate demo sync report
        run: npm run check:demos:report
      - name: Upload demo sync report
        uses: actions/upload-artifact@v4
        with:
          name: demo-sync-report
          path: demo-sync-report.json
      - name: Test demo sync CLI
        run: npm run test -- src/__tests__/check-demo-sync-script.test.ts
      - name: Test
        run: npm run test
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Serve and audit
        run: |
          npx serve out -l 3000 &
          sleep 3
          npx lighthouse http://localhost:3000 \
            --chrome-flags="--headless --no-sandbox" \
            --only-categories=accessibility,best-practices \
            --output=json --output-path=./lighthouse-report.json \
            --quiet
          SCORE=$(node -e "const r=require('./lighthouse-report.json');const a=r.categories.accessibility.score*100;console.log(a)")
          echo "Accessibility score: $SCORE"
          if [ "$SCORE" -lt 90 ]; then
            echo "::error::Accessibility score $SCORE is below 90"
            exit 1
          fi
