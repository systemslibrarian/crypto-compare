name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Type check
        run: npm run type-check
      - name: Validate data and demo sync
        run: npm run validate:full
      - name: Generate demo sync report
        run: npm run check:demos:report
      - name: Upload demo sync report
        uses: actions/upload-artifact@v4
        with:
          name: demo-sync-report
          path: demo-sync-report.json
      - name: Test demo sync CLI
        run: npm run test:demos
      - name: Test
        run: npm run test
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
      - name: Run end-to-end tests
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Serve and audit
        run: |
          npx serve out -l 3000 &
          sleep 3
          npx lighthouse http://localhost:3000 \
            --chrome-flags="--headless --no-sandbox" \
            --only-categories=accessibility,best-practices,performance \
            --output=json --output-path=./lighthouse-report.json \
            --quiet
          node -e '
            const r = require("./lighthouse-report.json");
            const cat = r.categories;
            const score = (key) => Math.round((cat[key]?.score ?? 0) * 100);
            const a = score("accessibility");
            const p = score("performance");
            const bp = score("best-practices");
            const audits = r.audits;
            const cls = audits["cumulative-layout-shift"]?.numericValue ?? 1;
            const cwv = (key) => audits[key]?.displayValue ?? "n/a";
            console.log(`Accessibility ${a} | Performance ${p} | Best-practices ${bp}`);
            console.log(`LCP ${cwv("largest-contentful-paint")} | CLS ${cwv("cumulative-layout-shift")} | TBT ${cwv("total-blocking-time")}`);
            // Hard gates: things that should always hold. Accessibility and
            // best-practices are mature; CLS is a stable Core Web Vital here.
            const hard = {
              "accessibility >= 90": a >= 90,
              "best-practices >= 90": bp >= 90,
              "CLS < 0.1": cls < 0.1,
              // Regression floor for performance; raise toward 90 as the home
              // bundle / TBT is optimized. Today the page scores ~67.
              "performance >= 55": p >= 55,
            };
            const failed = Object.entries(hard).filter(([, ok]) => !ok).map(([k]) => k);
            if (failed.length) {
              console.error(`::error::Lighthouse gate failed: ${failed.join(", ")}`);
              process.exit(1);
            }
            if (p < 90) {
              console.log(`::warning::Performance ${p} is below the 90 target (TBT/bundle weight on the home page).`);
            }
            console.log("Lighthouse gates passed.");
          '
      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lighthouse-report.json
          retention-days: 7
